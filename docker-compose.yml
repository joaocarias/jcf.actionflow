services:
  api:
    build:
      context: ./src/backend
      dockerfile: Jcf.ActionFlow.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
    ports:
      - "${API_PORT}:8080"

  web:
    build:
      context: ./src/frontend/jcf-actionflow-app
      args:
        VITE_API_URL: ${VITE_API_URL}
    ports:
      - "${WEB_PORT}:80"
    depends_on:
      - api
